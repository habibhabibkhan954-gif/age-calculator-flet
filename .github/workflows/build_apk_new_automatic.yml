name: BUILD APK NEW Automatic

on:
  push:                # no branches filter — runs on push to any branch
  pull_request:        # runs on PRs targeting any branch
  workflow_dispatch:   # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet[all]" certifi --upgrade --pre

      - name: Build APK with Flet
        run: |
          export FLET_EXTRA_MODULES=certifi
          flet build apk --verbose --no-rich-output --yes
        env:
          FLET_ANDROID_SIGNING_KEY_STORE: ${{ github.workspace }}/release.keystore
          FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD: "opensource_build_key"
          FLET_ANDROID_SIGNING_KEY_ALIAS: "release-alias"
          FLET_ANDROID_SIGNING_KEY_PASSWORD: "opensource_build_key"

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: build/apk/*.apk
